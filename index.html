<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="wrapper">
        <h1>weather app</h1>

        <div class="tab-container">
            <p class="tab" data-usewWeather>Your Weather</p>
            <p class="tab" data-searchWeather>Search Weather</p>
        </div>

        <div class="weather-container">
            <!-- grant location-->
            <div class="sub-container grant-location-container">
                <img src="./assets/location.png" width="80" height="80" loading="lazy">
                <p>grant Location Access</p>
                <p>Allow Access to get weather information</p>
                <button class="btn" data-grantAccess>Grant Access</button>
            </div>


            <!-- search form-->
            <form class="form-container" data-searchForm>
                <input placeholder="Search for city..." data-searchInput>
                <button class="btn" >
                    <img src="./assets/search.png" width="20" height="20" loading="lazy">
                </button>
            </form>

            <!--loading screen container-->

            <div class=" sub-container loading-container">
                <img src="./assets/loading.gif" width="150" height="150">
                <p>Loading</p>
            </div>

            <!--to showing weather information-->
            <div class=" sub-container user-info-container">

                <!--City name and flag-->
                <div class="name">
                  <p data-cityName></p>
                  <img data-countryIcon>
                </div>
             <!-- Weather Description-->
                <p data-weatherDesc></p>

              <!-- weather Icon-->
                <img data-weatherIcon>

             <!--temperature-->
                <p data-temp></p>

             <!--3 cards parameters-->

                <div class="parameter-container">

                   <!--card 1-->
                  <div class="parameter">
                      <img src="./assets/wind.png" >
                      <p>windspeed</p>
                     <p data-windSpeed></p>
                  </div>

                   <!-- card 2-->
                   <div class="parameter">
                        <img src="./assets/humidity.png">
                        <p>Humidity</p>
                        <p data-humidity></p>
                   </div>

                   <!-- card 3-->
                     
                   <div class="parameter">
                    <img src="./assets/cloud.png">
                    <p>cloude</p>
                    <p data-cloudiness></p>
                   </div>

                </div>



            </div>


        </div>

    </div> 
 <script src="script.js"></script> 
</body>
</html>
